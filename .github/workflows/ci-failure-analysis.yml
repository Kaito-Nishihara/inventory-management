name: CI Failure Analysis

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

jobs:
  analyze-failure:
    # CI が失敗し、かつ PR トリガーの場合のみ実行
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: CI 失敗ログを取得
        id: get-logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}

          # 失敗したジョブのログを取得
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | {name, conclusion, steps: [.steps[] | select(.conclusion == "failure") | {name, conclusion}]}' \
            > /tmp/failed-jobs.json

          # ログをダウンロード
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/logs" > /tmp/logs.zip || true
          if [ -f /tmp/logs.zip ]; then
            mkdir -p /tmp/ci-logs
            unzip -o /tmp/logs.zip -d /tmp/ci-logs 2>/dev/null || true
            # 各ログファイルの末尾（エラー付近）を結合
            find /tmp/ci-logs -name "*.txt" -exec tail -100 {} \; > /tmp/error-logs.txt
          fi

          # PR 番号を取得
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '.pull_requests[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "PR が見つかりません。スキップします。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Claude で失敗を分析
        if: steps.get-logs.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: "true"
          prompt: |
            ## CI 失敗分析タスク

            CI が失敗しました。以下の手順で分析してください。

            ### 1. 失敗情報を収集
            - Run ID: ${{ steps.get-logs.outputs.run_id }}
            - `/tmp/failed-jobs.json` に失敗したジョブ情報があります
            - `/tmp/error-logs.txt` にエラーログがあります（存在する場合）
            - `gh` コマンドでさらに詳細を取得できます

            ### 2. PR にコメントを投稿
            以下のフォーマットで PR #${{ steps.get-logs.outputs.pr_number }} にコメントしてください:

            ```
            ## 🔍 CI 失敗分析

            ### 失敗したジョブ
            - ジョブ名とステップ名

            ### 失敗分類
            lint / unit-test / build / e2e / infrastructure のいずれか

            ### エラー概要
            スタックトレースやエラーメッセージの要約（5行以内）

            ### 原因候補
            1. 最も可能性の高い原因
            2. 次に可能性の高い原因

            ### 影響範囲
            このエラーが影響するファイルや機能の範囲

            ### 推奨アクション
            修正の方向性（具体的なコード修正は行わない）
            ```

            ### 3. Issue 化の判定
            以下の **すべて** を満たす場合のみ、新しい Issue を作成してください:
            - 同種の既存 Open Issue がない（`gh issue list` で確認）
            - flaky テスト（タイミング依存・環境依存）ではない
            - コード起因の可能性が高い（外部サービス障害等ではない）
            - lint エラーや typo など自明な修正ではない

            Issue を作成する場合のフォーマット:
            ```
            タイトル: [CI失敗] 簡潔な説明
            ラベル: bug
            本文:
              ## 発生状況
              - PR: #番号
              - CI Run: URL
              - 失敗ジョブ: ジョブ名

              ## エラー内容
              要約

              ## 再現条件
              わかる範囲で

              ## 推奨対応
              方向性
            ```

            Issue 化 **しない** 場合は、PR コメントの末尾に以下を追記:
            ```
            > ℹ️ この失敗は Issue 化の条件を満たしませんでした（理由: ○○）
            ```
