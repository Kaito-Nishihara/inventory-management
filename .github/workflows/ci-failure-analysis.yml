name: CI Failure Analysis

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

jobs:
  analyze-failure:
    # CI が失敗し、かつ PR トリガーの場合のみ実行
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: CI 失敗ログを収集
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}

          # PR 番号を取得
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '.pull_requests[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "PR が見つかりません。スキップします。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 失敗したジョブとステップを取得
          FAILED_JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | {name, steps: [.steps[] | select(.conclusion == "failure") | .name]}]')

          # ログをダウンロード
          ERROR_LOG="(ログ取得失敗)"
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/logs" > /tmp/logs.zip 2>/dev/null || true
          if [ -f /tmp/logs.zip ] && [ -s /tmp/logs.zip ]; then
            mkdir -p /tmp/ci-logs
            unzip -o /tmp/logs.zip -d /tmp/ci-logs 2>/dev/null || true
            ERROR_LOG=$(find /tmp/ci-logs -name "*.txt" -exec grep -l -i "error\|fail\|assert" {} \; | head -5 | xargs -I{} tail -50 {} 2>/dev/null | head -200)
          fi

          # Claude 用のコンテキストファイルを作成
          cat > /tmp/ci-context.txt << CTXEOF
          CI Run ID: ${RUN_ID}
          PR: #${PR_NUMBER}
          URL: https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}

          === 失敗ジョブ ===
          ${FAILED_JOBS}

          === エラーログ（抜粋） ===
          ${ERROR_LOG}
          CTXEOF

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Claude で分析
        if: steps.collect.outputs.skip != 'true'
        id: analyze
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            `/tmp/ci-context.txt` を読んで CI 失敗を分析してください。

            以下のフォーマットで分析結果を出力してください。
            コメント投稿や Issue 作成は不要です。分析だけ行ってください。

            ## 🔍 CI 失敗分析

            **CI Run**: [Run #${{ steps.collect.outputs.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ steps.collect.outputs.run_id }})

            ### 失敗したジョブ
            - ジョブ名 > ステップ名

            ### 失敗分類
            `lint` / `unit-test` / `build` / `e2e` / `infrastructure` のいずれか

            ### エラー概要
            エラーメッセージの要約（5行以内）

            ### 原因候補
            1. 最も可能性の高い原因
            2. 次に可能性の高い原因

            ### 影響範囲
            このエラーが影響するファイルや機能

            ### 推奨アクション
            修正の方向性

      - name: PR にコメントを投稿
        if: steps.collect.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ steps.collect.outputs.pr_number }}
          RUN_ID=${{ steps.collect.outputs.run_id }}

          # Claude の実行結果ファイルから分析内容を取得
          ANALYSIS=""
          if [ -f /home/runner/work/_temp/claude-execution-output.json ]; then
            ANALYSIS=$(cat /home/runner/work/_temp/claude-execution-output.json | \
              python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          # result メッセージからテキストを抽出
          for msg in reversed(data) if isinstance(data, list) else [data]:
              if isinstance(msg, dict):
                  if msg.get('type') == 'result':
                      result = msg.get('result', '')
                      if result:
                          print(result)
                          break
                  elif msg.get('type') == 'assistant':
                      for content in msg.get('message', {}).get('content', []):
                          if isinstance(content, dict) and content.get('type') == 'text':
                              print(content['text'])
                              break
          " 2>/dev/null)
          fi

          if [ -z "$ANALYSIS" ]; then
            ANALYSIS="CI 失敗を検出しましたが、自動分析に失敗しました。\n\n[CI Run #${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}) を確認してください。"
          fi

          # 既存の分析コメントを探して更新、なければ新規作成
          EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("## 🔍 CI 失敗分析")) | .id' | tail -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              -X PATCH \
              -f body="${ANALYSIS}"
          else
            gh pr comment "${PR_NUMBER}" --body "${ANALYSIS}"
          fi
