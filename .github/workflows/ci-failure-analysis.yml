name: CI Failure Analysis

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

jobs:
  analyze-failure:
    # CI が失敗し、かつ PR トリガーの場合のみ実行
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: CI 失敗ログを取得
        id: get-logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}

          # PR 番号を取得
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '.pull_requests[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "PR が見つかりません。スキップします。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 失敗したジョブ情報を取得
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | {name, conclusion, steps: [.steps[] | select(.conclusion == "failure") | {name, conclusion}]}' \
            > /tmp/failed-jobs.json

          # ログをダウンロード
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/logs" > /tmp/logs.zip || true
          if [ -f /tmp/logs.zip ]; then
            mkdir -p /tmp/ci-logs
            unzip -o /tmp/logs.zip -d /tmp/ci-logs 2>/dev/null || true
            # 失敗ジョブのログだけ末尾を取得（全体だと大きすぎる）
            find /tmp/ci-logs -name "*.txt" -exec tail -80 {} \; > /tmp/error-logs.txt
            # 5000行で切る
            head -5000 /tmp/error-logs.txt > /tmp/error-logs-trimmed.txt
            mv /tmp/error-logs-trimmed.txt /tmp/error-logs.txt
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # ログ内容をファイルに保存（Claude のプロンプトに埋め込み用）
          echo "=== 失敗ジョブ ===" > /tmp/ci-failure-context.txt
          cat /tmp/failed-jobs.json >> /tmp/ci-failure-context.txt
          echo "" >> /tmp/ci-failure-context.txt
          echo "=== エラーログ（末尾抜粋） ===" >> /tmp/ci-failure-context.txt
          if [ -f /tmp/error-logs.txt ]; then
            cat /tmp/error-logs.txt >> /tmp/ci-failure-context.txt
          else
            echo "(ログ取得失敗)" >> /tmp/ci-failure-context.txt
          fi

      - name: Claude で失敗を分析してコメント投稿
        if: steps.get-logs.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: "true"
          prompt: |
            ## CI 失敗分析タスク

            PR #${{ steps.get-logs.outputs.pr_number }} の CI が失敗しました。
            CI Run: https://github.com/${{ github.repository }}/actions/runs/${{ steps.get-logs.outputs.run_id }}

            `/tmp/ci-failure-context.txt` にログがあります。読んで分析してください。

            分析結果を以下のマークダウンフォーマットで **標準出力に出力** してください（コメント投稿はシステムが行います）:

            ## 🔍 CI 失敗分析

            **CI Run**: [#${{ steps.get-logs.outputs.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ steps.get-logs.outputs.run_id }})

            ### 失敗したジョブ
            - ジョブ名 > ステップ名

            ### 失敗分類
            `lint` / `unit-test` / `build` / `e2e` / `infrastructure` のいずれか

            ### エラー概要
            スタックトレースやエラーメッセージの要約（5行以内）

            ### 原因候補
            1. 最も可能性の高い原因
            2. 次に可能性の高い原因

            ### 影響範囲
            このエラーが影響するファイルや機能

            ### 推奨アクション
            修正の方向性（具体的なコード修正は行わない）

            ### Issue 化判定
            以下の **すべて** を満たす場合は `gh issue create` で Issue を作成してください:
            - 同種の既存 Open Issue がない（`gh issue list` で確認）
            - flaky テスト（タイミング依存）ではない
            - コード起因の可能性が高い
            - lint エラーや typo など自明な修正ではない

            条件を満たさない場合は理由を記載してください。
