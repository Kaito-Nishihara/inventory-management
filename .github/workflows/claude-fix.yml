name: Claude AI Fix

on:
  issue_comment:
    types: [created]

concurrency:
  group: claude-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  ai-fix:
    # PR 上のコメントで /ai-fix が含まれている場合のみ実行
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ai-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: PR 情報を取得
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}")
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          echo "head_ref=${HEAD_REF}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: レビューコメントと CI 失敗情報を収集
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ steps.pr.outputs.pr_number }}

          # AI レビューコメントを取得
          REVIEW_COMMENT=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | startswith("## 🤖 AI レビュー")) | .body] | last // ""')

          # /ai-fix コメントから追加指示を抽出
          FULL_COMMENT="${{ github.event.comment.body }}"
          USER_INSTRUCTION=$(echo "$FULL_COMMENT" | sed 's|/ai-fix||' | xargs)

          {
            echo "review<<GHEOF"
            echo "$REVIEW_COMMENT" | head -150
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "user_instruction<<GHEOF"
            echo "$USER_INSTRUCTION"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Claude でコード修正を実行
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "/ai-fix"
          settings: |
            {
              "permissions": {
                "allow": ["Edit", "Write", "Read", "Glob", "Grep", "Bash(git:*)", "Bash(dotnet:*)", "Bash(npm:*)", "Bash(npx:*)"]
              }
            }
          prompt: |
            PR #${{ steps.pr.outputs.pr_number }} のレビュー指摘を修正してください。
            CLAUDE.md を読んでリポジトリの構成を把握してください。

            ユーザー追加指示: ${{ steps.context.outputs.user_instruction }}

            以下が AI レビューの指摘です。「コード品質」「テストカバレッジ」セクションの具体的指摘のみ修正してください。
            大規模リファクタリングは避け、指摘事項に集中すること。
            コミットメッセージとコード中コメントは日本語で書くこと。
            修正後にコミット＆プッシュしてください。

            ${{ steps.context.outputs.review }}
