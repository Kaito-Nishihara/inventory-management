syntax = "proto3";

option csharp_namespace = "Inventory.Contracts";

package inventory;

service InventoryGrpc {
  rpc Reserve (ReserveInventoryRequest) returns (ReserveInventoryReply);
  rpc Release (ReleaseInventoryRequest) returns (ReleaseInventoryReply);
}

message ReserveInventoryRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message ReserveInventoryReply {
  bool success = 1;
  string error_code = 2;
}

message ReleaseInventoryRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message ReleaseInventoryReply {
  bool success = 1;
  string error_code = 2;
}
